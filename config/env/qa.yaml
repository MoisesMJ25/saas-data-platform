# config/env/qa.yaml — Ambiente QA (simulado en local con prefix /qa/).
paths:
  raw:             "data/qa/raw"
  bronze:          "data/qa/bronze"
  silver:          "data/qa/silver"
  gold:            "data/qa/gold"
  quarantine_root: "data/qa"
  quality_logs:    "data/qa/shared/quality_logs"

spark:
  shuffle_partitions: 8
  log_level: "INFO"

quality:
  fail_on_critical: true   # En QA sí fallar ante errores críticos
