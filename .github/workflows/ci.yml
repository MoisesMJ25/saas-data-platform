name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Linter (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17 (requerido por PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      - name: Validate YAML config files
        run: |
          python - <<'EOF'
          from saas_pipeline.config import load_config
          for env in ("dev", "qa", "main"):
              cfg = load_config(env=env, tenant="all")
              assert cfg.paths.bronze, f"paths.bronze vacío en {env}"
              assert cfg.paths.silver, f"paths.silver vacío en {env}"
              assert cfg.paths.gold,   f"paths.gold vacío en {env}"
              print(f"[ok] config/{env}.yaml carga correctamente")
          EOF

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PYSPARK_PYTHON: python
          PYSPARK_DRIVER_PYTHON: python
